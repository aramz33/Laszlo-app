<!DOCTYPE html>
<!--
  Laszlo runtime tester — temporary local UI to exercise the edge functions like the
  app would (pick artwork / persona / params, see hotspots, ask, hear TTS). Throwaway:
  not production code. Just open this file in a browser (CORS on the functions is *).
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Laszlo runtime tester</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 system-ui, sans-serif; background: #111; color: #eee; }
  header { padding: 10px 16px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  header input { width: 360px; }
  main { display: grid; grid-template-columns: 320px 1fr; gap: 0; height: calc(100vh - 52px); }
  aside { padding: 16px; border-right: 1px solid #333; overflow: auto; }
  section.out { padding: 16px; overflow: auto; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: #8fc7ff; margin: 18px 0 8px; }
  h2:first-child { margin-top: 0; }
  label { display: block; font-size: 12px; color: #aaa; margin: 8px 0 2px; }
  input, select, textarea, button { background: #222; color: #eee; border: 1px solid #444; border-radius: 6px; padding: 7px 9px; font: inherit; }
  input, select, textarea { width: 100%; }
  textarea { resize: vertical; }
  button { cursor: pointer; background: #2b3a4a; border-color: #3d566e; width: auto; }
  button:hover { background: #36506a; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .chips label { display: inline-flex; gap: 4px; align-items: center; margin-right: 10px; color: #ddd; }
  .chips input { width: auto; }
  .card { background: #181818; border: 1px solid #333; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
  .hotspot-title { font-weight: 700; color: #f7f1e7; }
  .muted { color: #888; font-size: 12px; }
  .sources { font-size: 11px; color: #7a9; margin-top: 6px; }
  pre { white-space: pre-wrap; word-break: break-word; margin: 0; }
  .pill { display:inline-block; font-size:11px; padding:1px 7px; border-radius:10px; background:#333; margin-left:6px; }
  .err { color: #ff8a8a; }
</style>
</head>
<body>
<header>
  <strong>Laszlo tester</strong>
  <input id="base" value="https://spbrkgoseabpsxzkkyzj.supabase.co" />
  <input id="key" value="sb_publishable_epoXdGqDD0BLj8b3W73wbw_DDQkR84k" placeholder="publishable key" />
  <span class="muted">lang</span>
  <select id="lang" style="width:90px"><option>fr</option><option>en</option><option>nl</option></select>
</header>

<main>
<aside>
  <h2>Profile</h2>
  <label>Allure (length)</label>
  <select id="allure"><option>court</option><option selected>moyen</option><option>long</option></select>
  <label>Niveau (register)</label>
  <select id="niveau"><option>decouverte</option><option selected>amateur</option><option>passionne</option></select>
  <label>Intérêts</label>
  <div class="chips" id="interets">
    <label><input type="checkbox" class="interest" value="technique" checked>technique</label>
    <label><input type="checkbox" class="interest" value="people">people</label>
    <label><input type="checkbox" class="interest" value="stories">stories</label>
    <label><input type="checkbox" class="interest" value="symbols">symbols</label>
  </div>
  <label>Free text (onboarding)</label>
  <input id="freetext" placeholder="ex: j'aime la lumière" />
  <div class="row" style="margin-top:8px">
    <button onclick="buildPersona()">Build persona</button>
    <label style="display:inline-flex;gap:4px;align-items:center;margin:0"><input type="checkbox" id="injectPersona" style="width:auto"> inject</label>
  </div>
  <pre id="persona" class="muted" style="margin-top:6px"></pre>

  <h2>Steering</h2>
  <label>Lens</label>
  <select id="lens"><option value="">(none)</option><option>technique</option><option>people</option><option>stories</option><option>symbols</option></select>
  <label>Tone</label>
  <input id="tone" placeholder="ex: warm" />

  <h2>Voice (TTS)</h2>
  <label>Provider</label>
  <select id="provider"><option>auto</option><option>edge</option><option>mistral</option><option>google</option></select>

  <h2>Artwork</h2>
  <select id="artwork"></select>
  <button style="margin-top:8px" onclick="openArtwork()">Open (load hotspots)</button>

  <h2>Fallbacks</h2>
  <label>Identify (upload a photo)</label>
  <input type="file" id="imgfile" accept="image/*" style="width:auto" />
  <button onclick="identify()">Identify</button>
  <label>Transcribe (upload audio)</label>
  <input type="file" id="audfile" accept="audio/*" style="width:auto" />
  <button onclick="transcribe()">Transcribe → ask box</button>
</aside>

<section class="out">
  <h2>Hotspots <span id="hsmeta" class="muted"></span></h2>
  <div id="hotspots"></div>

  <h2>Ask</h2>
  <textarea id="question" rows="2" placeholder="Pose une question…"></textarea>
  <div class="row" style="margin:6px 0">
    <button onclick="ask()">Ask (stream)</button>
    <span class="muted">point x,y (optionnel)</span>
    <input id="px" style="width:70px" placeholder="x 0-1" />
    <input id="py" style="width:70px" placeholder="y 0-1" />
    <button onclick="speak(document.getElementById('answer').innerText)">🔊 speak answer</button>
  </div>
  <div class="card"><pre id="answer"></pre><div id="answersrc" class="sources"></div></div>

  <h2>Follow-ups</h2>
  <div id="followups"></div>

  <audio id="audio" controls style="width:100%;margin-top:10px"></audio>
  <div id="log" class="muted" style="margin-top:8px"></div>
</section>
</main>

<script>
const $ = (id) => document.getElementById(id);
const base = () => $("base").value.replace(/\/$/, "");
const fnUrl = (n) => `${base()}/functions/v1/${n}`;
const headers = () => ({ "Authorization": `Bearer ${$("key").value}`, "Content-Type": "application/json" });
const log = (m, err) => { $("log").innerHTML = `<span class="${err?'err':''}">${m}</span>`; };
let personaSummary = null;
let currentArtwork = null;   // { id, hotspots:[{id,title}] }

function profile() {
  const interets = [...document.querySelectorAll(".interest:checked")].map(c => c.value);
  const p = { allure: $("allure").value, niveau: $("niveau").value, interets, free_text: $("freetext").value || null };
  if ($("injectPersona").checked && personaSummary) p.persona_summary = personaSummary;
  return p;
}
const steering = () => ({ lens: $("lens").value || null, tone: $("tone").value || null });
const lang = () => $("lang").value;

async function gen(body) {
  const r = await fetch(fnUrl("generate"), { method: "POST", headers: headers(), body: JSON.stringify(body) });
  if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
  return r.json();
}

// --- load artworks (trackable set) + their hotspots from PostgREST ---
async function loadArtworks() {
  try {
    const url = `${base()}/rest/v1/artwork?select=id,object_number,title_en,title_nl,hotspot(id,title)&ref_image_url=not.is.null&order=object_number`;
    const r = await fetch(url, { headers: { apikey: $("key").value, Authorization: `Bearer ${$("key").value}` } });
    const rows = await r.json();
    $("artwork").innerHTML = rows.map((a, i) =>
      `<option value="${i}">${a.title_en || a.title_nl || a.object_number} (${a.object_number})</option>`).join("");
    window._artworks = rows;
    log(`${rows.length} artworks loaded`);
  } catch (e) { log("load artworks failed: " + e.message, true); }
}

function buildPersona() {
  const onboarding = { allure: $("allure").value, niveau: $("niveau").value,
    interets: [...document.querySelectorAll(".interest:checked")].map(c => c.value), free_text: $("freetext").value || null };
  $("persona").textContent = "…";
  gen({ mode: "persona", lang: lang(), onboarding })
    .then(d => { personaSummary = d.persona_summary; $("persona").textContent = d.persona_summary; $("injectPersona").checked = true; })
    .catch(e => { $("persona").textContent = ""; log(e.message, true); });
}

async function openArtwork() {
  const a = window._artworks[$("artwork").value];
  currentArtwork = a;
  const ids = (a.hotspot || []).map(h => h.id);
  $("hsmeta").textContent = `${a.object_number} · ${ids.length} hotspots · generating…`;
  $("hotspots").innerHTML = "";
  if (!ids.length) { $("hsmeta").textContent = `${a.object_number} · no hotspots`; return; }
  try {
    const d = await gen({ mode: "hotspot", artwork_id: a.id, hotspot_ids: ids, lang: lang(), profile: profile(), steering: steering() });
    $("hsmeta").textContent = `${a.object_number} · ${d.items.length} hotspots`;
    $("hotspots").innerHTML = d.items.map(it => {
      const title = (a.hotspot.find(h => h.id === it.hotspot_id) || {}).title || it.hotspot_id;
      const src = (it.sources || []).map(s => `${s.source}/${s.lang}`).join(", ");
      return `<div class="card">
        <div class="hotspot-title">${title} <span class="pill">${it.status}</span></div>
        <pre>${it.text ?? it.message ?? ""}</pre>
        <div class="sources">sources: ${src || "—"}</div>
        <div class="row" style="margin-top:6px">
          <button onclick='speak(${JSON.stringify(it.text || "")})'>🔊</button>
          <button onclick='followups("${it.hotspot_id}")'>follow-ups</button>
        </div></div>`;
    }).join("");
  } catch (e) { $("hsmeta").textContent = ""; log(e.message, true); }
}

async function ask() {
  if (!currentArtwork) return log("open an artwork first", true);
  const body = { mode: "ask", artwork_id: currentArtwork.id, question: $("question").value,
    lang: lang(), profile: profile(), steering: steering() };
  if ($("px").value && $("py").value) body.point = { x: +$("px").value, y: +$("py").value };
  $("answer").textContent = ""; $("answersrc").textContent = "";
  try {
    const res = await fetch(fnUrl("generate"), { method: "POST", headers: headers(), body: JSON.stringify(body) });
    const reader = res.body.pipeThrough(new TextDecoderStream()).getReader();
    let buf = "";
    for (;;) {
      const { value, done } = await reader.read(); if (done) break;
      buf += value; const lines = buf.split("\n"); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data:")) continue;
        const ev = JSON.parse(line.slice(5));
        if (ev.type === "delta") $("answer").textContent += ev.delta;
        else if (ev.type === "done") $("answersrc").textContent = "sources: " + (ev.sources || []).map(s => `${s.source}/${s.lang}`).join(", ");
        else if (ev.type === "error") log(ev.message, true);
      }
    }
  } catch (e) { log(e.message, true); }
}

async function followups(hotspotId) {
  $("followups").innerHTML = "…";
  try {
    const d = await gen({ mode: "followups", artwork_id: currentArtwork.id, hotspot_id: hotspotId || null, lang: lang(), profile: profile(), steering: steering() });
    $("followups").innerHTML = d.questions.map(q =>
      `<div class="card row" style="justify-content:space-between">
        <span>${q}</span><button onclick='$("question").value=${JSON.stringify(q)};ask()'>ask →</button></div>`).join("");
  } catch (e) { $("followups").innerHTML = ""; log(e.message, true); }
}

async function speak(text) {
  if (!text) return;
  log("synthesizing…");
  try {
    const r = await fetch(fnUrl("speak"), { method: "POST", headers: headers(),
      body: JSON.stringify({ text, lang: lang(), provider: $("provider").value }) });
    const d = await r.json();
    if (!d.audio_url) throw new Error(d.message || "no audio");
    $("audio").src = d.audio_url; $("audio").play();
    log(`speak ok (engine: ${d.engine})`);
  } catch (e) { log(e.message, true); }
}

async function identify() {
  const f = $("imgfile").files[0]; if (!f) return log("pick an image", true);
  const form = new FormData(); form.append("image", f);
  if (currentArtwork) form.append("candidate_ids", (window._artworks || []).map(a => a.id).join(","));
  log("identifying…");
  try {
    const r = await fetch(fnUrl("identify"), { method: "POST", headers: { Authorization: `Bearer ${$("key").value}` }, body: form });
    const d = await r.json();
    const a = (window._artworks || []).find(x => x.id === d.artwork_id);
    log(`identify → ${d.artwork_id ? (a ? a.object_number : d.artwork_id) : "no match"} (conf ${d.confidence})`);
  } catch (e) { log(e.message, true); }
}

async function transcribe() {
  const f = $("audfile").files[0]; if (!f) return log("pick an audio file", true);
  const form = new FormData(); form.append("audio", f); form.append("lang_hint", lang());
  log("transcribing…");
  try {
    const r = await fetch(fnUrl("transcribe"), { method: "POST", headers: { Authorization: `Bearer ${$("key").value}` }, body: form });
    const d = await r.json();
    $("question").value = d.text || ""; log(`transcribed (${d.duration_s ?? "?"}s)`);
  } catch (e) { log(e.message, true); }
}

loadArtworks();
</script>
</body>
</html>
