<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Newsreader', Georgia, serif;
    background: radial-gradient(120% 90% at 50% 18%, #1b1712 0%, #100d09 55%, #080604 100%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  @keyframes hsPulse { 0% { transform: scale(0.7); opacity: 0.55; } 70% { opacity: 0; } 100% { transform: scale(2.4); opacity: 0; } }
  @keyframes hsBreathe { 0%,100% { opacity: 0.9; } 50% { opacity: 0.45; } }
  @keyframes wave { 0% { transform: scaleY(0.22); } 100% { transform: scaleY(1); } }
  @keyframes sweep { 0% { top: 8%; opacity: 0; } 12% { opacity: 1; } 88% { opacity: 1; } 100% { top: 92%; opacity: 0; } }
  @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes ringOut { 0% { transform: scale(0.6); opacity: 0.6; } 100% { transform: scale(2.2); opacity: 0; } }
  @keyframes dotDrift { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes arrowNudge { 0%,100% { transform: rotate(-32deg) translateY(0); } 50% { transform: rotate(-32deg) translateY(-6px); } }
</style>
</helmet>

<div style="--accent:{{ accent }}; height:100vh; overflow:hidden; display:flex; align-items:center; justify-content:center; padding:20px;">
  <div style="position:relative; width:393px; height:852px; flex:none; border-radius:54px; padding:13px; background:linear-gradient(150deg,#1c1c1e,#000); box-shadow:0 50px 120px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,255,255,0.04), inset 0 0 0 2px rgba(255,255,255,0.03); transform-origin:center center; transform:scale({{ scale }});">
    <div style="position:relative; width:100%; height:100%; border-radius:42px; overflow:hidden; background:#0b0907;">

      <!-- ===== CAMERA / ARTWORK LAYER ===== -->
      <div style="position:absolute; inset:0; z-index:0;">
        <sc-if value="{{ showArtwork }}" hint-placeholder-val="{{ true }}">
          <sc-if value="{{ isNight }}" hint-placeholder-val="{{ false }}">
            <div style="position:absolute; inset:0; background-color:#0b0907; background-image:url('night-watch.png'); background-size:{{ framingSize }}; background-position:center; background-repeat:no-repeat;"></div>
          </sc-if>
          <sc-if value="{{ isMilk }}" hint-placeholder-val="{{ true }}">
            <div style="position:absolute; inset:0; background:#0b0907;">
              <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="milk-cam" shape="rect" fit="{{ milkFit }}" placeholder="La Laitière — glissez le tableau ici" style="display:block; width:100%; height:100%;" hint-size="100%,100%"></x-import>
            </div>
          </sc-if>
        </sc-if>
        <div style="position:absolute; inset:0; background:linear-gradient(180deg, rgba(8,6,4,0.55) 0%, rgba(8,6,4,0) 22%, rgba(8,6,4,0) 46%, rgba(8,6,4,0.85) 100%); pointer-events:none;"></div>
      </div>

      <!-- ===== STATUS BAR ===== -->
      <div style="position:absolute; top:0; left:0; right:0; height:54px; z-index:80; display:flex; align-items:flex-end; justify-content:space-between; padding:0 30px 8px; pointer-events:none;">
        <span style="font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:500; color:#f4f1ea; letter-spacing:0.02em;">10:42</span>
        <span style="font-family:'JetBrains Mono',monospace; font-size:11px; color:#f4f1ea; letter-spacing:0.1em;">▮▮▮ &nbsp;◗ &nbsp;87%</span>
      </div>

      <!-- ===== TOP HUD (tour) ===== -->
      <sc-if value="{{ isTour }}" hint-placeholder-val="{{ false }}">
        <div style="position:absolute; top:54px; left:0; right:0; z-index:60; display:flex; align-items:flex-start; justify-content:space-between; padding:10px 16px;">
          <div style="display:flex; align-items:center; gap:8px;">
            <span style="width:9px; height:9px; flex:none; background:var(--accent, #d8b06a); border-radius:2px; transform:rotate(45deg); box-shadow:0 0 12px var(--accent, #d8b06a);"></span>
            <span style="font-family:'Newsreader',serif; font-weight:500; font-size:22px; color:#f4f1ea; line-height:1;">Lazlo</span>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <div style="position:relative;">
              <button onClick="{{ onLang }}" style="height:34px; padding:0 11px; border-radius:999px; border:1px solid rgba(244,241,234,0.16); background:rgba(16,14,10,0.5); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); color:#f4f1ea; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; cursor:pointer; display:flex; align-items:center; gap:5px;">{{ langCode }} <span style="opacity:0.5; font-size:8px;">{{ langCaret }}</span></button>
              <sc-if value="{{ langMenuOpen }}" hint-placeholder-val="{{ false }}">
                <div style="position:absolute; top:40px; right:0; z-index:120; display:flex; flex-direction:column; gap:2px; padding:6px; border-radius:14px; background:rgba(16,14,10,0.88); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border:1px solid rgba(244,241,234,0.14); box-shadow:0 14px 34px rgba(0,0,0,0.55); min-width:148px; animation:fadeUp 0.18s ease both;">
                  <sc-for list="{{ langMenu }}" as="lm" hint-placeholder-count="3">
                    <button onClick="{{ lm.onClick }}" style="display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 11px; border-radius:10px; border:0; background:{{ lm.bg }}; color:{{ lm.fg }}; font-family:'Newsreader',serif; font-size:17px; cursor:pointer; text-align:left;">{{ lm.label }} <span style="font-family:'JetBrains Mono',monospace; font-size:9px; opacity:0.6;">{{ lm.code }}</span></button>
                  </sc-for>
                </div>
              </sc-if>
            </div>
            <button onClick="{{ onMem }}" style="position:relative; width:34px; height:34px; flex:none; border-radius:50%; border:1px solid rgba(244,241,234,0.16); background:rgba(16,14,10,0.5); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); color:rgba(244,241,234,0.8); font-family:'JetBrains Mono',monospace; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;">◷<sc-if value="{{ hasMem }}" hint-placeholder-val="{{ false }}"><span style="position:absolute; top:-3px; right:-3px; min-width:16px; height:16px; padding:0 3px; border-radius:999px; background:var(--accent, #d8b06a); color:#1a1206; font-size:9px; display:flex; align-items:center; justify-content:center;">{{ memCount }}</span></sc-if></button>
            <button onClick="{{ onAudio }}" style="width:34px; height:34px; flex:none; border-radius:50%; border:1px solid rgba(244,241,234,0.16); background:rgba(16,14,10,0.5); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); color:rgba(244,241,234,0.8); cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; font-size:13px;">≋</button>
            <button onClick="{{ rescan }}" style="width:34px; height:34px; flex:none; border-radius:50%; border:1px solid rgba(244,241,234,0.12); background:rgba(16,14,10,0.5); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); color:rgba(244,241,234,0.7); font-family:'JetBrains Mono',monospace; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;">✕</button>
          </div>
        </div>
      </sc-if>

      <!-- ===== HOTSPOTS ===== -->
      <sc-if value="{{ isTour }}" hint-placeholder-val="{{ false }}">
        <div style="position:absolute; inset:0; z-index:20;">
          <sc-for list="{{ hotspots }}" as="hot" hint-placeholder-count="3">
            <button onClick="{{ hot.onClick }}" style="position:absolute; left:{{ hot.x }}%; top:{{ hot.y }}%; transform:translate(-50%,-50%); width:64px; height:64px; border:0; background:transparent; cursor:pointer; padding:0; z-index:{{ hot.z }};">
              <span style="position:absolute; inset:0; margin:auto; width:18px; height:18px; border-radius:50%; border:1px solid color-mix(in srgb, var(--accent, #d8b06a) 60%, transparent); animation:hsPulse 2.8s ease-out infinite;"></span>
              <span style="position:absolute; inset:0; margin:auto; width:11px; height:11px; border-radius:50%; background:{{ hot.core }}; box-shadow:0 0 14px 3px color-mix(in srgb, var(--accent, #d8b06a) 70%, transparent); animation:hsBreathe 3s ease-in-out infinite;"></span>
              <span style="position:absolute; inset:0; margin:auto; width:5px; height:5px; border-radius:50%; background:#fff;"></span>
              <sc-if value="{{ hot.active }}" hint-placeholder-val="{{ false }}">
                <span style="position:absolute; left:50%; top:-12px; transform:translate(-50%,-100%); white-space:nowrap; font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:#0b0907; background:var(--accent, #d8b06a); padding:5px 9px; border-radius:5px;">{{ hot.label }}</span>
              </sc-if>
            </button>
          </sc-for>

          <!-- user-placed point -->
          <sc-if value="{{ hasPlaced }}" hint-placeholder-val="{{ false }}">
            <span style="position:absolute; left:{{ placedX }}%; top:{{ placedY }}%; transform:translate(-50%,-50%); width:54px; height:54px; z-index:23; pointer-events:none;">
              <span style="position:absolute; inset:0; margin:auto; width:16px; height:16px; border-radius:50%; border:1.5px dashed #fff; animation:ringOut 2s ease-out infinite;"></span>
              <span style="position:absolute; inset:0; margin:auto; width:9px; height:9px; border-radius:50%; background:#fff; box-shadow:0 0 12px rgba(255,255,255,0.8);"></span>
            </span>
          </sc-if>

          <!-- place-mode tap layer -->
          <sc-if value="{{ placeMode }}" hint-placeholder-val="{{ false }}">
            <div onClick="{{ onPlaceTap }}" style="position:absolute; left:0; right:0; top:0; bottom:42%; z-index:24; cursor:crosshair; background:rgba(8,6,4,0.18);">
              <div style="position:absolute; top:46%; left:0; right:0; text-align:center; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.14em; color:rgba(244,241,234,0.85);">{{ placeHint }}</div>
            </div>
          </sc-if>
        </div>
      </sc-if>

      <!-- ===== ONBOARDING ===== -->
      <sc-if value="{{ isOnboard }}" hint-placeholder-val="{{ true }}">
        <div style="position:absolute; inset:0; z-index:70; background:radial-gradient(130% 90% at 50% 0%, #181410 0%, #0b0907 72%); padding:84px 26px 30px; display:flex; flex-direction:column;">

          <!-- back + progress + skip -->
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:26px;">
            <div style="display:flex; align-items:center; gap:12px;">
              <sc-if value="{{ obShowBack }}" hint-placeholder-val="{{ false }}">
                <button onClick="{{ obBack }}" style="background:transparent; border:0; color:rgba(244,241,234,0.6); font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.08em; cursor:pointer; padding:0; display:flex; align-items:center; gap:5px;">← {{ ui_back }}</button>
              </sc-if>
              <div style="display:flex; gap:6px;">
                <sc-for list="{{ obDots }}" as="d" hint-placeholder-count="3">
                  <span style="width:{{ d.w }}; height:4px; border-radius:3px; background:{{ d.bg }};"></span>
                </sc-for>
              </div>
            </div>
            <button onClick="{{ obSkip }}" style="background:transparent; border:0; color:rgba(244,241,234,0.5); font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.12em; cursor:pointer;">{{ ui_skip }}</button>
          </div>

          <!-- step: language (always first — everything adapts to this) -->
          <sc-if value="{{ obLang }}" hint-placeholder-val="{{ true }}">
            <div style="display:flex; flex-direction:column; gap:6px; margin-bottom:30px;">
              <div style="font-family:'Newsreader',serif; font-size:34px; line-height:1.15; color:#f4f1ea;">Bonjour.</div>
              <div style="font-family:'Newsreader',serif; font-size:26px; line-height:1.15; color:rgba(244,241,234,0.55);">Goedendag. Hello.</div>
              <div style="font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.06em; color:rgba(244,241,234,0.5); margin-top:10px;">{{ ob_langSub }}</div>
            </div>
            <div style="display:flex; flex-direction:column; gap:12px;">
              <sc-for list="{{ langOpts }}" as="lo" hint-placeholder-count="3">
                <button onClick="{{ lo.onClick }}" style="display:flex; align-items:center; justify-content:space-between; padding:18px 20px; border-radius:16px; border:1px solid rgba(244,241,234,0.14); background:rgba(244,241,234,0.03); cursor:pointer;">
                  <span style="font-family:'Newsreader',serif; font-size:22px; color:#f4f1ea;">{{ lo.label }}</span>
                  <span style="font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.14em; color:var(--accent, #d8b06a);">{{ lo.code }} →</span>
                </button>
              </sc-for>
            </div>
          </sc-if>

          <!-- step: QCM (allure / niveau / interet) -->
          <sc-if value="{{ obQcm }}" hint-placeholder-val="{{ false }}">
            <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; color:var(--accent, #d8b06a); margin-bottom:8px;">{{ qcmKicker }}</div>
            <div style="font-family:'Newsreader',serif; font-size:32px; line-height:1.12; color:#f4f1ea; margin-bottom:6px;">{{ qcmTitle }}</div>
            <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.06em; color:rgba(244,241,234,0.45); margin-bottom:26px;">{{ qcmSub }}</div>
            <div style="display:flex; flex-wrap:wrap; gap:11px;">
              <sc-for list="{{ qcmOpts }}" as="op" hint-placeholder-count="4">
                <button onClick="{{ op.onClick }}" style="padding:13px 18px; border-radius:14px; border:1px solid {{ op.bd }}; background:{{ op.bg }}; color:{{ op.fg }}; font-family:'Newsreader',serif; font-size:19px; cursor:pointer;">{{ op.label }}</button>
              </sc-for>
            </div>
            <sc-if value="{{ showQcmFree }}" hint-placeholder-val="{{ false }}">
              <div style="margin-top:22px;">
                <div style="font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.14em; color:rgba(244,241,234,0.4); margin-bottom:8px;">{{ freeLabel }}</div>
                <input value="{{ freeVal }}" onInput="{{ onFree }}" placeholder="{{ freePh }}" style="width:100%; padding:13px 15px; border-radius:12px; border:1px solid rgba(244,241,234,0.16); background:rgba(244,241,234,0.04); color:#f4f1ea; font-family:'Newsreader',serif; font-size:17px; line-height:1.3; outline:none;" />
              </div>
            </sc-if>
            <div style="margin-top:auto; padding-top:24px;">
              <button onClick="{{ obNext }}" style="width:100%; padding:16px; border-radius:14px; border:0; background:{{ contBg }}; color:{{ contFg }}; font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.12em; cursor:pointer;">{{ ui_continue }}</button>
            </div>
          </sc-if>

          <!-- step: persona reveal -->
          <sc-if value="{{ obPersona }}" hint-placeholder-val="{{ false }}">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:18px;">
              <span style="width:7px; height:7px; border-radius:50%; background:var(--accent, #d8b06a); box-shadow:0 0 10px var(--accent, #d8b06a); animation:hsBreathe 2.4s ease-in-out infinite;"></span>
              <span style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.16em; color:var(--accent, #d8b06a);">{{ personaKicker }}</span>
            </div>
            <div style="font-family:'Newsreader',serif; font-size:32px; line-height:1.1; color:#f4f1ea; margin-bottom:14px;">{{ personaHead }}</div>
            <div style="font-family:'Newsreader',serif; font-weight:300; font-style:italic; font-size:21px; line-height:1.4; color:rgba(244,241,234,0.82); margin-bottom:22px; text-wrap:pretty;">{{ personaLine }}</div>
            <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px;">
              <sc-for list="{{ personaPills }}" as="p" hint-placeholder-count="3">
                <span style="padding:8px 13px; border-radius:999px; border:1px solid color-mix(in srgb, var(--accent, #d8b06a) 34%, transparent); background:color-mix(in srgb, var(--accent, #d8b06a) 9%, transparent); color:#f4f1ea; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.08em;">{{ p }}</span>
              </sc-for>
            </div>
            <div style="font-family:'JetBrains Mono',monospace; font-size:9.5px; line-height:1.6; letter-spacing:0.04em; color:rgba(244,241,234,0.4);">{{ personaNote }}</div>
            <div style="margin-top:auto; padding-top:24px;">
              <button onClick="{{ obEnter }}" style="width:100%; padding:16px; border-radius:14px; border:0; background:var(--accent, #d8b06a); color:#1a1206; font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.12em; cursor:pointer;">{{ ui_enter }} →</button>
            </div>
          </sc-if>
        </div>
      </sc-if>

      <!-- ===== SCAN OVERLAY ===== -->
      <sc-if value="{{ isScan }}" hint-placeholder-val="{{ false }}">
        <div onClick="{{ skipScan }}" style="position:absolute; inset:0; z-index:50; background:rgba(8,6,4,0.4); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;">
          <div style="position:relative; width:230px; height:230px;">
            <span style="position:absolute; top:0; left:0; width:30px; height:30px; border-top:2px solid rgba(244,241,234,0.85); border-left:2px solid rgba(244,241,234,0.85);"></span>
            <span style="position:absolute; top:0; right:0; width:30px; height:30px; border-top:2px solid rgba(244,241,234,0.85); border-right:2px solid rgba(244,241,234,0.85);"></span>
            <span style="position:absolute; bottom:0; left:0; width:30px; height:30px; border-bottom:2px solid rgba(244,241,234,0.85); border-left:2px solid rgba(244,241,234,0.85);"></span>
            <span style="position:absolute; b
</x-dc>
</body>
</html>
